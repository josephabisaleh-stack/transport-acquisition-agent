name: Daily Acquisition Scan

on:
  schedule:
    - cron: "0 7 * * *"    # 07:00 UTC = 09:00 Paris / Geneva
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit seen_listings.db back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium browser
        run: playwright install chromium --with-deps

      # Restore saved login sessions (cookies) from previous run
      - name: Restore browser sessions cache
        uses: actions/cache@v4.2.3
        with:
          path: .browser_sessions
          key: browser-sessions-v1
          restore-keys: browser-sessions-v1

      - name: Run agent
        env:
          EMAIL_SENDER:              ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:            ${{ secrets.EMAIL_PASSWORD }}
          FUSACQ_EMAIL:              ${{ secrets.FUSACQ_EMAIL }}
          FUSACQ_PASSWORD:           ${{ secrets.FUSACQ_PASSWORD }}
          CESSION_PME_EMAIL:         ${{ secrets.CESSION_PME_EMAIL }}
          CESSION_PME_PASSWORD:      ${{ secrets.CESSION_PME_PASSWORD }}
          TRANSENTREPRISE_EMAIL:     ${{ secrets.TRANSENTREPRISE_EMAIL }}
          TRANSENTREPRISE_PASSWORD:  ${{ secrets.TRANSENTREPRISE_PASSWORD }}
          ALVO_EMAIL:                ${{ secrets.ALVO_EMAIL }}
          ALVO_PASSWORD:             ${{ secrets.ALVO_PASSWORD }}
        run: python main.py

      # Persist browser sessions (cookies) for next run
      - name: Save browser sessions cache
        uses: actions/cache@v4.2.3
        with:
          path: .browser_sessions
          key: browser-sessions-v1

      # Upload debug screenshots as artifacts (available for 7 days)
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore

      # Commit seen_listings.db back to the repo for reliable persistence
      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_listings.db
          git diff --cached --quiet || git commit -m "chore: update seen_listings.db [skip ci]"
          git push
